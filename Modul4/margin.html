<!DOCTYPE html>
<html>
<head>
    <title>Latihan Pengaturan Margin</title>
    <style>
        div {
            border: 1px solid black; 
            margin: 40px 50px 60px 30px; 
            background-color: lightblue; 
            padding: 10px;
        }
    </style>
</head>
<body>

    <div>
        Elemen ini memiliki margin atas 40px, kanan 50px, bawah 60px, dan kiri 30px.
    </div>

</body>
</html>
