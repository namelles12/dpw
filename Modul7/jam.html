<html>
<head>
    <title>Jam Real-Time</title>
</head>
<body onload="tampilkanWaktu()">
    <h2>Waktu Saat Ini:</h2>
    <h1 id="clock"></h1>

    <script>
        function tampilkanWaktu() {
            var waktu = new Date();
            var tahun = waktu.getFullYear();
            var bulan = waktu.getMonth() + 1;
            var tanggal = waktu.getDate();
            var jam = waktu.getHours();
            var menit = waktu.getMinutes();
            var detik = waktu.getSeconds();

            // Menambahkan angka 0 di depan jika angka < 10 agar format konsisten
            jam = (jam < 10) ? "0" + jam : jam;
            menit = (menit < 10) ? "0" + menit : menit;
            detik = (detik < 10) ? "0" + detik : detik;

            var strWaktu = tanggal + "/" + bulan + "/" + tahun + " - " + jam + ":" + menit + ":" + detik;
            
            document.getElementById("clock").innerHTML = strWaktu;

            // Menjalankan fungsi kembali setiap 1000 milidetik (1 detik)
            setTimeout(tampilkanWaktu, 1000);
        }
    </script>
</body>
</html>
